spring:
  application:
    name: simulator-service

simulator:
  tick-interval-ms: 1000
  low-battery-threshold-percent: 20
  charging-complete-percent: 80

grpc:
  client:
    booking-service:
      address: static://127.0.0.1:9090
      negotiationType: plaintext

logging:
  level:
    com.volvo.powersync.simulator: INFO

spring:
  application:
    name: simulator-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: simulator-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

simulator:
  tick-interval-ms: 1000
  low-battery-threshold-percent: 20
  charging-complete-percent: 80
  # Charging: battery gain per tick (driving drain is random 2% or 4% each tick)
  battery-charge-percent-per-tick: 4

grpc:
  client:
    booking-service:
      address: static://127.0.0.1:9090
      negotiationType: plaintext

logging:
  level:
    com.volvo.powersync.simulator: INFO

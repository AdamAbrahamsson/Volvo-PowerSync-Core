<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerSync Cars</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <h1>PowerSync Car Status</h1>
    <p class="subtitle">Click "Get status" on any car to fetch current battery and state.</p>

    <section class="controls">
      <label for="apiBaseUrl">Simulator API base URL</label>
      <input id="apiBaseUrl" type="text" value="http://localhost:8080" />
      <label for="bookingApiBaseUrl">Booking API base URL</label>
      <input id="bookingApiBaseUrl" type="text" value="http://localhost:8081" />
      <label for="notificationApiBaseUrl">Notification API base URL</label>
      <input id="notificationApiBaseUrl" type="text" value="http://localhost:8082" />
      <button id="loadCarsButton" type="button">Load cars</button>
    </section>

    <section id="error" class="error" aria-live="polite"></section>
    <section class="vip-panel">
      <h2>Station Status</h2>
      <p>Live status for normal and VIP charging hubs.</p>
      <div id="stationsStatus" class="stations-grid"></div>
    </section>
    <section class="vip-panel">
      <h2>VIP Station Hub</h2>
      <p>Select one VIP car, then book the single VIP station.</p>
      <label for="vipCarSelect">VIP car</label>
      <select id="vipCarSelect"></select>
      <button id="bookVipButton" type="button">Book station</button>
      <div id="vipResult" class="status">No VIP booking request yet.</div>
    </section>
    <section id="carsContainer" class="cars"></section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
